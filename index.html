<!DOCTYPE html>
<html>
<head>
    <title>Construction Management System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        h1 {
            background: #333;
            color: white;
            padding: 15px;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }
        th {
            background: #555;
            color: white;
        }
    </style>
</head>
<body>

<h1>Smart Construction Management System</h1>

<h2>Project Details</h2>

<table>
    <tr>
        <th>Project Name</th>
        <th>Location</th>
        <th>Budget</th>
    </tr>
    <tr>
        <td>Bridge Project</td>
        <td>Delhi</td>
        <td>₹50,00,000</td>
    </tr>
</table>

<h2>Workers</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Role</th>
        <th>Daily Wage</th>
    </tr>
    <tr>
        <td>Ravi</td>
        <td>Engineer</td>
        <td>₹1500</td>
    </tr>
    <tr>
        <td>Amit</td>
        <td>Labor</td>
        <td>₹800</td>
    </tr>
</table>

<h2>Materials</h2>

<table>
    <tr>
        <th>Material</th>
        <th>Cost per Unit</th>
    </tr>
    <tr>
        <td>Cement</td>
        <td>₹350</td>
    </tr>
    <tr>
        <td>Steel</td>
        <td>₹600</td>
    </tr>
</table>

</body>
</html>
